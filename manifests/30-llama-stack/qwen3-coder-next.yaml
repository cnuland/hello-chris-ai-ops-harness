# Qwen3-Coder-Next FP8 — Community vLLM v0.15.1
# 80B MoE (3B active), FP8 quantized, on 2x H200 GPUs
# Uses community vLLM cu130-nightly image for CUDA 13.0 driver compat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-coder-next
  namespace: llm-serving
  labels:
    app: qwen3-coder-next
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen3-coder-next
  template:
    metadata:
      labels:
        app: qwen3-coder-next
    spec:
      runtimeClassName: nvidia
      serviceAccountName: granite-sa
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:cu130-nightly
          args:
            - --model=Qwen/Qwen3-Coder-Next-FP8
            - --served-model-name=qwen3-coder-next
            - --port=8080
            - --max-model-len=32768
            - --tensor-parallel-size=2
            - --trust-remote-code
            - --enable-auto-tool-choice
            - --tool-call-parser=qwen3_coder
            - --gpu-memory-utilization=0.90
            - --kv-cache-dtype=fp8
            - --disable-uvicorn-access-log
          env:
            - name: HOME
              value: /tmp
            - name: HF_HUB_CACHE
              value: /models
            - name: HF_HUB_OFFLINE
              value: "0"
            - name: TRANSFORMERS_OFFLINE
              value: "0"
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "2"
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "2"
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /models
              name: model-cache
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-coder-next
  namespace: llm-serving
  labels:
    app: qwen3-coder-next
spec:
  selector:
    app: qwen3-coder-next
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
